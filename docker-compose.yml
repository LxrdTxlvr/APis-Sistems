version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - backend-db:/app/prisma
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=3000
      - JWT_SECRET=super-secret-jwt-key-2026
      - OPENWEATHER_API_KEY=tu_api_key_de_openweathermap
      - GEMINI_API_KEY=${GEMINI_API_KEY:-tu_api_key_de_gemini}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-tu_api_key_de_stripe}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-db:
